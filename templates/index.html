<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background-blur"></div>

    <div class="main-container">

        <header class="top-bar">
            <h1>🎓 Student Management</h1>

            <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
        </header>


        <section class="card form-card">

            <h2>Add New Student</h2>

            <form action="/add" method="post" class="student-form">

                <input type="text" name="name" placeholder="Full Name" required>
                <input type="number" name="age" placeholder="Age" required>
                <input type="text" name="course" placeholder="Course" required>
                <input type="text" name="phone" placeholder="Phone Number" required>

                <button type="submit">Add Student</button>

            </form>

        </section>


        <section class="card table-card">

            <div class="table-header">
                <h2>Students List</h2>
                <input type="text" id="searchInput" placeholder="🔍 Search student..." onkeyup="searchTable()">
            </div>

            <div class="table-responsive">

                <table id="studentTable">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Course</th>
                            <th>Phone</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for s in students %}
                        <tr>
                            <td>{{ s.id }}</td>
                            <td>{{ s.name }}</td>
                            <td>{{ s.age }}</td>
                            <td>{{ s.course }}</td>
                            <td>{{ s.phone }}</td>

                            <td class="action-btns">
                                <a href="/edit/{{ s.id }}" class="edit-btn">Edit</a>
                                <a href="/delete/{{ s.id }}" class="delete-btn">Delete</a>
                            </td>
                        </tr>
                        {% endfor %}

                    </tbody>
                </table>

            </div>

        </section>

    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark");
        }

        function searchTable() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.querySelectorAll("#studentTable tbody tr");

            rows.forEach(row => {
                let text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }
    </script>

</body>

</html>
